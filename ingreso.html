<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso - Por el Mundo</title>
    <link rel="stylesheet" href="style/style_in.css">
    <link href="https://fonts.googleapis.com/css2?family=Caudex&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-reloj">
        <p id="reloj-dinamico"></p>
    </div>

    <main class="contenedor-login">
        <h1>Inicie Sesión</h1>
        
        <form id="form-ingreso" action="#" method="POST">
            <div class="grupo-input">
                <label for="usuario-email">Email:</label>
                <input type="text" id="usuario-email" name="usuario-email" placeholder="Ingrese su email" required>
                <span class="mensaje-error" id="error-email"></span>
            </div>
            
            <div class="grupo-input">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" id="btn-ingresar" href="index.html">Ingresar</button>
        </form>
    </main>

    <script src="js/ingreso.js"></script>
</body>
</html>
