<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Por el Mundo</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/style_c.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Por el Mundo</h1>
            <div id="reloj-dinamico" class="reloj">--:--:--</div>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Datos de Cliente</h2>
            <form id="form-vendedor" onsubmit="validarFormulario(event)">
    <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>
        <small id="nombre-error" class="error-msg"></small>
    </div>
    
    <div class="form-group">
        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" required>
        <small id="apellido-error" class="error-msg"></small>
    </div>

    <div class="form-group">
        <label for="cuit">CUIT (Solo números)</label>
        <input type="text" id="cuit" name="cuit" oninput="validarNumeros(event)" maxlength="11" required>
        <small id="cuit-error" class="error-msg"></small>
    </div>

    <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" name="correo" required>
        <small id="correo-error" class="error-msg"></small>
    </div>

    <button type="submit" class="btn-primary">Reservar</button>
    </form>
        </section>

        <section class="card">
            <h2>Cotizador de Paquetes</h2>
            <div class="form-group">
                <label for="destino">Seleccione el Destino</label>
                <select id="destino" onchange="calcularPaquete()">
                    <option value="0">Seleccione un destino...</option>
                    <option value="75000">Refugio en la Patagonia - $75.000 / Día</option>
                    <option value="150000">Arquitectura en Estocolmo - $150.000 / Día</option>
                    <option value="196000">Auroras Boreales - $196.000 / Día</option>
                    <option value="70000">Parque Nacional Cotubanamá - $70.000 / Día</option>
                    <option value="125000">Egipto - $125.000 / Día</option>
                    <option value="180000">Aomori - $180.000 / Día</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dias">Cantidad de Días</label>
                <input type="number" id="dias" name="dias" min="1" max="15" value="1" oninput="calcularPaquete()">
            </div>

            <div id="resultado-cotizacion" class="resultado-box">
                Total Estimado: $0.00
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Emisión del reporte: <span id="fecha-reporte"></span></p>
    </footer>

    <script src="js/compra.js"></script>
</body>
</html>
