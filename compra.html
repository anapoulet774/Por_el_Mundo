<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Por el Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Caudex:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style_c.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Por el Mundo</h1>
            <div id="reloj-dinamico" class="reloj">--:--:--</div>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Datos de Cliente</h2>
            <form id="form-vendedor" onsubmit="validarFormulario(event)">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" required>
                </div>

                <div class="form-group">
                    <label for="cuit">CUIT (Solo números)</label>
                    <input type="text" id="cuit" name="cuit" oninput="validarNumeros(event)" maxlength="11" required>
                    <small id="cuit-error" class="error-msg">El CUIT debe contener exactamente 11 números.</small>
                </div>

                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" required>
                </div>

                <button type="submit" class="btn-primary">Reservar</button>
            </form>
        </section>

        <section class="card">
            <h2>Cotizador de Paquetes</h2>
            <div class="form-group">
                <label for="destino">Seleccione el Destino</label>
                <select id="destino" onchange="calcularPaquete()">
                    <option value="0">Seleccione un destino...</option>
                    <option value="450000">Refugio en la Patagonia - $450.000</option>
                    <option value="1200000">Arquitectura en Estocolmo - $1.200.000</option>
                    <option value="980000">Auroras Boreales - $980.000</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pasajeros">Cantidad de Pasajeros</label>
                <input type="number" id="pasajeros" name="pasajeros" min="1" max="15" value="1" oninput="calcularPaquete()">
            </div>

            <div id="resultado-cotizacion" class="resultado-box">
                Total Estimado: $0.00
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Emisión del reporte: <span id="fecha-reporte"></span></p>
    </footer>

    <script src="js/scripts.js"></script>
</body>
</html>
